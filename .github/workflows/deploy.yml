name: Deploy to Holocron
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: npx -y @holocron.so/cli deploy
        env:
          HOLOCRON_KEY: ${{ secrets.HOLOCRON_KEY }}
